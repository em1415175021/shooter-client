apply plugin: 'com.android.application'

configurations {
    natives
    all {
        exclude group: 'org.json', module: 'json'
    }
}

android {
    namespace 'com.game.shooter'
    compileSdk 34
    buildToolsVersion "34.0.0"

    defaultConfig {
        applicationId "com.game.shooter"
        minSdk 21
        targetSdk 34
        versionCode 2                 // 已递增
        versionName "1.1"
        multiDexEnabled true

        // 明确指定支持的 ABI 架构
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // 告知 Android 打包时从 libs 目录获取原生库
    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
        }
    }

    packagingOptions {
        resources {
            excludes += [
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
                'META-INF/*.kotlin_module'
            ]
        }
        jniLibs {
            useLegacyPackaging = true    // 兼容 Android 16KB 页面大小
        }
    }
}

dependencies {
    implementation project(':core')
    implementation "com.badlogicgames.gdx:gdx-backend-android:1.12.0"
    implementation 'androidx.multidex:multidex:2.0.1'

    natives "com.badlogicgames.gdx:gdx-platform:1.12.0:natives-armeabi-v7a"
    natives "com.badlogicgames.gdx:gdx-platform:1.12.0:natives-arm64-v8a"
    natives "com.badlogicgames.gdx:gdx-platform:1.12.0:natives-x86"
    natives "com.badlogicgames.gdx:gdx-platform:1.12.0:natives-x86_64"
}

// ===== 原生库复制任务（增强版）=====
tasks.register('cleanLibs') {
    doFirst {
        delete fileTree('libs') {
            include '**/*.so'
        }
        println "🧹 Cleaned old .so files from libs/"
    }
}

tasks.register('copyAndroidNatives') {
    dependsOn cleanLibs   // 先清理旧文件
    doFirst {
        // 确保各 ABI 目录存在
        ['armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'].each { abi ->
            file("libs/${abi}").mkdirs()
        }
    }
    doLast {
        // 遍历 natives 配置中的所有 artifact
        configurations.natives.resolvedConfiguration.resolvedArtifacts.each { artifact ->
            def name = artifact.name
            def outputDir = null
            if      (name.contains('natives-arm64-v8a'))    outputDir = file('libs/arm64-v8a')
            else if (name.contains('natives-armeabi-v7a'))  outputDir = file('libs/armeabi-v7a')
            else if (name.contains('natives-x86_64'))       outputDir = file('libs/x86_64')
            else if (name.contains('natives-x86'))          outputDir = file('libs/x86')

            if (outputDir != null) {
                copy {
                    from zipTree(artifact.file)
                    into outputDir
                    include '*.so'
                }
                println "✅ Copied ${artifact.file.name} -> ${outputDir}"
            }
        }
    }
}

// 确保 preBuild 依赖 copyAndroidNatives
afterEvaluate {
    tasks.matching { it.name == 'preBuild' }.configureEach {
        it.dependsOn('copyAndroidNatives')
    }
}