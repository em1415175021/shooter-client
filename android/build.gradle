apply plugin: 'com.android.application'

configurations {
    natives
    all {
        exclude group: 'org.json', module: 'json'
    }
}

android {
    namespace 'com.game.shooter'
    compileSdk 34
    buildToolsVersion "34.0.0"

    defaultConfig {
        applicationId "com.game.shooter"
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.1"
        multiDexEnabled true

        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
        }
    }

    packagingOptions {
        resources {
            excludes += [
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
                'META-INF/*.kotlin_module'
            ]
        }
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
    implementation project(':core')
    implementation "com.badlogicgames.gdx:gdx-backend-android:1.12.0"
    implementation 'androidx.multidex:multidex:2.0.1'

    natives "com.badlogicgames.gdx:gdx-platform:1.12.0:natives-armeabi-v7a"
    natives "com.badlogicgames.gdx:gdx-platform:1.12.0:natives-arm64-v8a"
    natives "com.badlogicgames.gdx:gdx-platform:1.12.0:natives-x86"
    natives "com.badlogicgames.gdx:gdx-platform:1.12.0:natives-x86_64"
}

// ===== 修复后的原生库复制任务 =====
tasks.register('cleanLibs') {
    doFirst {
        delete fileTree('libs') {
            include '**/*.so'
        }
        // 同时删除可能遗留的 zip_xxx 临时目录
        file('libs').eachDir { dir ->
            if (dir.name.startsWith('zip_')) {
                delete dir
            }
        }
        println "🧹 Cleaned old .so files and zip_* directories"
    }
}

tasks.register('copyAndroidNatives') {
    dependsOn cleanLibs
    doFirst {
        ['armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'].each { abi ->
            file("libs/${abi}").mkdirs()
        }
    }
    doLast {
        configurations.natives.resolvedConfiguration.resolvedArtifacts.each { artifact ->
            def name = artifact.name
            def targetAbi = null
            if (name.contains('natives-arm64-v8a')) targetAbi = 'arm64-v8a'
            else if (name.contains('natives-armeabi-v7a')) targetAbi = 'armeabi-v7a'
            else if (name.contains('natives-x86_64')) targetAbi = 'x86_64'
            else if (name.contains('natives-x86')) targetAbi = 'x86'

            if (targetAbi != null) {
                def outputDir = file("libs/${targetAbi}")
                copy {
                    from zipTree(artifact.file)
                    into outputDir
                    include '**/*.so'
                    // 将所有 .so 文件直接放到输出目录，忽略中间文件夹
                    eachFile { fcd ->
                        fcd.relativePath = new RelativePath(true, fcd.name)
                    }
                    includeEmptyDirs(false)
                }
                println "✅ Copied libgdx.so to ${outputDir}"
            }
        }
    }
}

afterEvaluate {
    tasks.matching { it.name == 'preBuild' }.configureEach {
        it.dependsOn('copyAndroidNatives')
    }
}