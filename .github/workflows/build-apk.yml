name: 🔫 Build Shooter Game APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. 配置 JDK 17 ──────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. 生成 Gradle Wrapper ──────────────────────
      - name: 🐘 Generate Gradle Wrapper
        run: |
          # 使用已安装的 gradle 生成 wrapper
          gradle wrapper --gradle-version=8.4
          chmod +x gradlew
          echo "✅ Gradle Wrapper 生成完成"

      # ── 4. 创建 local.properties ─────────────────────
      - name: 📝 Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "✅ local.properties 创建完成"
          cat local.properties

      # ── 5. 接受 Android SDK 许可 ────────────────────
      - name: ✅ Accept Android SDK Licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$ANDROID_HOME/licenses/android-sdk-license"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> "$ANDROID_HOME/licenses/android-sdk-license"

      # ── 6. Gradle 缓存 ───────────────────────────────
      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 7. 构建 Debug APK ────────────────────────────
      - name: 🔨 Build Debug APK
        run: |
          ./gradlew :android:assembleDebug --stacktrace

      # ── 8. 查找 APK 文件 ────────────────────────────
      - name: 📊 Find APK Files
        if: always()
        run: |
          echo "=== 查找 APK 文件 ==="
          find . -name "*.apk" -type f | while read apk; do
            echo "✅ 找到 APK: $apk"
            ls -la "$apk"
          done

      # ── 9. 上传 APK ─────────────────────────────────
      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shooter-game-apk-${{ github.run_number }}
          path: |
            **/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── 10. 失败时上传构建报告 ───────────────────────
      - name: 📋 Upload Build Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.run_number }}
          path: |
            **/build/reports/
            **/build/outputs/
          retention-days: 7
