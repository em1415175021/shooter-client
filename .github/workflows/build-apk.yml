name: 🔫 Debug Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      
      - name: 🔧 Generate wrapper
        run: gradle wrapper --gradle-version=8.4
      
      - name: 🔑 Grant execute permission
        run: chmod +x gradlew
      
      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      
      # 验证原生库目录内容（确认手动添加的 .so 文件存在）
      - name: 🔍 Verify native libraries
        run: |
          echo "=== Contents of android/src/main/jniLibs ==="
          find android/src/main/jniLibs -type f 2>/dev/null || echo "No files found in android/src/main/jniLibs"
          echo "=== If libgdx.so is not listed, check your git push ==="
      
      - name: 🔨 Build
        run: |
          ./gradlew :android:assembleDebug --stacktrace
      
      # 上传生成的 APK
      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shooter-game-apk-${{ github.run_number }}
          path: |
            **/*.apk
          if-no-files-found: warn
          retention-days: 30