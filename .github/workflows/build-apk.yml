name: 🔫 Build Shooter Game APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. 配置 JDK 17 ──────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. 检查项目结构 ──────────────────────────────
      - name: 🔍 Check Project Structure
        run: |
          echo "=== 当前目录内容 ==="
          ls -la
          echo "=== 检查 android 目录 ==="
          if [ -d "android" ]; then
            echo "android 目录存在"
            ls -la android/
          fi

      # ── 4. 授予 gradlew 执行权限（修复版）────────────
      - name: 🔑 Grant execute permission for gradlew
        run: |
          # 只设置存在的文件权限
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            echo "✅ 已设置 android/gradlew 执行权限"
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "✅ 已设置 gradlew 执行权限"
          else
            echo "⚠️ 未找到 gradlew 文件，继续执行"
          fi
        shell: /usr/bin/bash {0}

      # ── 5. 创建 local.properties ─────────────────────
      - name: 📝 Create local.properties
        run: |
          if [ -d "android" ]; then
            echo "sdk.dir=$ANDROID_HOME" > android/local.properties
            echo "✅ 已创建 android/local.properties"
          else
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            echo "✅ 已创建 local.properties"
          fi

      # ── 6. Gradle 缓存 ───────────────────────────────
      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 7. 构建 APK ──────────────────────────────────
      - name: 🔨 Build APK
        run: |
          if [ -f "android/gradlew" ]; then
            echo "使用 android/gradlew 构建"
            cd android
            ./gradlew assembleDebug --stacktrace
          elif [ -f "gradlew" ]; then
            echo "使用 gradlew 构建"
            ./gradlew assembleDebug --stacktrace
          else
            echo "❌ 未找到 gradlew，无法构建"
            exit 1
          fi

      # ── 8. 查找并上传 APK ────────────────────────────
      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shooter-game-apk-${{ github.run_number }}
          path: |
            **/*.apk
          if-no-files-found: warn
          retention-days: 30
