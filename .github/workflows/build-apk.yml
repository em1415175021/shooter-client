name: 🔫 Debug Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      
      - name: 🔧 Generate wrapper
        run: gradle wrapper --gradle-version=8.4
      
      - name: 🔑 Grant execute permission
        run: chmod +x gradlew
      
      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      
      # 列出 natives 依赖，确认是否下载了 gdx-platform
      - name: 📋 List natives dependencies
        run: ./gradlew :android:dependencies --configuration natives
      
      # 显式复制原生库
      - name: 📦 Copy native libraries
        run: ./gradlew :android:copyAndroidNatives
      
      # 验证 libs 目录内容
      - name: 🔍 Verify native libraries
        run: |
          echo "=== Contents of android/libs ==="
          find android/libs -type f 2>/dev/null || echo "No files found in android/libs"
          echo "=== If libgdx.so is not listed, copyAndroidNatives may have failed ==="
      
      - name: 🔨 Build
        run: |
          ./gradlew :android:assembleDebug --stacktrace
      
      # 上传生成的 APK
      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shooter-game-apk-${{ github.run_number }}
          path: |
            **/*.apk
          if-no-files-found: warn
          retention-days: 30