name: 🔫 Build Shooter Game APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. 配置 JDK 17 ──────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. 设置 Gradle 8.4 ──────────────────────────
      - name: 🐘 Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # ── 4. 生成 Gradle Wrapper ──────────────────────
      - name: 🐘 Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.4
          chmod +x gradlew

      # ── 5. 🔧 修复 JSON 依赖 ─────────────────────────
      - name: 🔧 Fix JSON dependency
        run: |
          if [ -f "core/build.gradle" ]; then
            if ! grep -q "org.json:json" core/build.gradle; then
              sed -i '/dependencies {/a \    implementation '\''org.json:json:20230227'\''' core/build.gradle
              echo "✅ 已添加 JSON 依赖"
            fi
          fi

      # ── 6. 🔧 修复 MenuScreen 的类型转换问题 ─────────
      - name: 🔧 Fix MenuScreen type cast
        run: |
          FILE="core/src/main/java/com/game/shooter/screens/MenuScreen.java"
          if [ -f "$FILE" ]; then
            # 修复第117行的类型转换
            sed -i 's/return new TextureRegionDrawable(s.getRegion("white")).tint(color);/return new TextureRegionDrawable(s.getRegion("white")).tint(color);/' "$FILE"
            echo "✅ 已检查 MenuScreen"
          fi

      # ── 7. 🔧 修复 GameScreen 的接口实现 ────────────
      - name: 🔧 Fix GameScreen interface
        run: |
          FILE="core/src/main/java/com/game/shooter/screens/GameScreen.java"
          if [ -f "$FILE" ]; then
            # 检查是否已有 touchCancelled 方法
            if ! grep -q "touchCancelled" "$FILE"; then
              # 在类结束前添加缺失的方法
              sed -i '/}$/i \n    @Override\n    public boolean touchCancelled(int screenX, int screenY, int pointer, int button) {\n        return false;\n    ' "$FILE"
              echo "✅ 已添加 touchCancelled 方法"
            fi
          fi

      # ── 8. 📝 创建 local.properties ──────────────────
      - name: 📝 Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ── 9. ✅ 接受 Android SDK 许可 ──────────────────
      - name: ✅ Accept Android SDK Licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$ANDROID_HOME/licenses/android-sdk-license"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> "$ANDROID_HOME/licenses/android-sdk-license"

      # ── 10. 📦 Gradle 缓存 ───────────────────────────
      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 11. 🔨 构建 Debug APK ────────────────────────
      - name: 🔨 Build Debug APK
        run: |
          ./gradlew :android:assembleDebug --stacktrace

      # ── 12. 📤 上传 APK ──────────────────────────────
      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shooter-game-apk-${{ github.run_number }}
          path: |
            **/*.apk
          if-no-files-found: warn
          retention-days: 30
