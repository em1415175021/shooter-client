name: 🔫 Build Shooter Game APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. 配置 JDK 17 ──────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. 授予 gradlew 执行权限 ────────────────────
      - name: 🔑 Grant execute permission for gradlew
        run: |
          chmod +x gradlew
          # 如果 gradlew 在 android 目录下
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          fi

      # ── 4. 创建 local.properties ─────────────────────
      - name: 📝 Create local.properties
        run: |
          # 如果项目根目录有 android 子目录
          if [ -d "android" ]; then
            echo "sdk.dir=$ANDROID_HOME" > android/local.properties
            cat android/local.properties
          else
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            cat local.properties
          fi

      # ── 5. 检查项目结构 ──────────────────────────────
      - name: 🔍 Check Project Structure
        run: |
          echo "=== 当前目录内容 ==="
          ls -la
          echo "=== 检查 Android 模块 ==="
          if [ -d "android" ]; then
            echo "android 目录存在"
            ls -la android/
          fi
          echo "=== 检查 app 模块 ==="
          if [ -d "app" ]; then
            echo "app 目录存在"
            ls -la app/
          fi
          echo "=== 检查 settings.gradle ==="
          find . -name "settings.gradle*" -type f

      # ── 6. Gradle 缓存 ───────────────────────────────
      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 7. 自动检测并构建 APK ────────────────────────
      - name: 🔨 Build Debug APK
        run: |
          # 检测并构建正确的模块
          if [ -f "android/gradlew" ]; then
            # 项目在 android 子目录中
            cd android
            ./gradlew assembleDebug --stacktrace
          elif [ -f "gradlew" ]; then
            # gradlew 在根目录
            # 检测可用的模块
            MODULES=$(./gradlew projects --no-daemon | grep -o "Project ':[a-zA-Z0-9_-]*'" | cut -d"'" -f2)
            echo "可用模块: $MODULES"
            
            # 尝试构建常见模块名
            if echo "$MODULES" | grep -q ":app"; then
              echo "找到 :app 模块，开始构建"
              ./gradlew :app:assembleDebug --stacktrace
            elif echo "$MODULES" | grep -q ":android"; then
              echo "找到 :android 模块，开始构建"
              ./gradlew :android:assembleDebug --stacktrace
            else
              echo "未找到标准模块，尝试构建所有模块"
              ./gradlew assembleDebug --stacktrace
            fi
          else
            echo "错误：未找到 gradlew 文件"
            exit 1
          fi

      # ── 8. 查找 APK ─────────────────────────────────
      - name: 📊 Find and List APKs
        if: always()
        run: |
          echo "=== 查找所有 APK 文件 ==="
          find . -name "*.apk" -type f | while read apk; do
            echo "✅ 找到 APK: $apk"
            ls -la "$apk"
          done
          
          # 如果没有找到 APK，显示更多信息
          if [ $(find . -name "*.apk" -type f | wc -l) -eq 0 ]; then
            echo "❌ 未找到 APK 文件"
            echo "=== 检查 build 目录 ==="
            find . -type d -name "build" -maxdepth 3 | while read build_dir; do
              echo "检查: $build_dir"
              ls -la "$build_dir" 2>/dev/null || true
            done
          fi

      # ── 9. 上传 APK ─────────────────────────────────
      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shooter-game-apk-${{ github.run_number }}
          path: |
            **/*.apk
          retention-days: 30
          if-no-files-found: warn

      # ── 10. 失败时上传构建报告 ───────────────────────
      - name: 📋 Upload Build Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.run_number }}
          path: |
            **/build/reports/
            **/build/outputs/
          retention-days: 7
