name: 🔫 Debug Project Structure

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  debug-project:
    name: Debug Project Structure
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. 详细显示项目结构 ──────────────────────────
      - name: 🔍 Show Full Project Structure
        run: |
          echo "=== 当前目录所有文件 ==="
          ls -la
          
          echo -e "\n=== 递归查找所有构建相关文件 ==="
          echo "--- 查找 gradle 相关文件 ---"
          find . -name "*gradle*" -type f | sort
          
          echo -e "\n--- 查找 build.gradle 文件 ---"
          find . -name "build.gradle*" -type f | sort
          
          echo -e "\n--- 查找 settings.gradle 文件 ---"
          find . -name "settings.gradle*" -type f | sort
          
          echo -e "\n--- 查找 gradlew 文件 ---"
          find . -name "gradlew*" -type f | sort
          
          echo -e "\n--- 查找 apk 相关文件 ---"
          find . -name "*.apk" -type f | sort
          
          echo -e "\n=== 显示重要文件内容 ==="
          # 显示根目录下的重要文件
          for file in package.json pubspec.yaml; do
            if [ -f "$file" ]; then
              echo -e "\n--- $file 内容 ---"
              cat "$file"
            fi
          done
          
          # 显示 gradle 文件内容
          for file in $(find . -name "build.gradle" -o -name "settings.gradle" | head -3); do
            echo -e "\n--- $file 内容前20行 ---"
            head -20 "$file" 2>/dev/null || true
          done

      # ── 3. 检查 Android SDK 环境 ────────────────────
      - name: 📱 Check Android Environment
        run: |
          echo "=== Android 环境 ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          
          echo -e "\n=== SDK 工具 ==="
          if [ -d "$ANDROID_HOME/cmdline-tools" ]; then
            ls -la "$ANDROID_HOME/cmdline-tools"
          fi
